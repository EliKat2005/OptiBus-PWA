name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint con Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
      - run: uv pip install --system ruff
      - run: ruff check backend/

  test:
    name: Tests de integración
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: optibus
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: optibus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U optibus
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      POSTGRES_USER: optibus
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: optibus_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      REDIS_URL: redis://localhost:6379/0
      OPTIBUS_API_KEY: test-key-32-chars-minimum!!
      JWT_SECRET: test-jwt-secret-32-chars-minimum!!
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
      - run: uv pip install --system -r backend/requirements.txt
      - name: Run tests
        run: cd backend && python -m pytest tests/ -v --tb=short

  security:
    name: SAST Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
      - run: uv pip install --system bandit
      - run: bandit -r backend/ -x backend/tests/ -lll --skip B101,B105,B107,B110
