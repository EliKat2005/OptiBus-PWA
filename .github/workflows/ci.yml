name: OptiBus CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: optibus
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: optibus_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          cd backend
          pip install --no-cache-dir -r requirements.txt
          pip install pytest pytest-asyncio httpx pytest-cov

      - name: Run tests
        env:
          POSTGRES_USER: optibus
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: optibus_test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
          LOG_LEVEL: ERROR
        run: |
          cd backend
          python -m pytest test_api.py -v --tb=short --timeout=30

      - name: Security lint
        run: |
          pip install bandit
          cd backend && bandit -r . -x ./test_api.py -s B101

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'
        env:
          SHELLCHECK_OPTS: -e SC1091 -e SC2034

      - name: Lint compose.yaml
        run: |
          python -m pip install yamllint
          yamllint -d "{extends: relaxed, rules: {line-length: disable, document-start: disable}}" compose.yaml