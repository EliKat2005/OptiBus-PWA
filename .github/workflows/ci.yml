name: CI/CD - OptiBus Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'deploy/config/**'
      - 'frontend/**'
      - 'Caddyfile'
      - 'compose.yaml'
      - 'deploy.sh'
      - 'scripts/**'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

permissions:
  contents: read

jobs:
  test:
    name: 🧪 Tests + Lint + Security Scan
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ['3.12', '3.13']

    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_DB: optibus_test
          POSTGRES_USER: optibus_test
          POSTGRES_PASSWORD: test_password_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://optibus_test:test_password_ci@localhost:5432/optibus_test
      REDIS_URL: redis://localhost:6379/0
      OPTIBUS_API_KEY: test-api-key-ci-32chars-minimum!!
      POSTGRES_DB: optibus_test
      POSTGRES_USER: optibus_test
      POSTGRES_PASSWORD: test_password_ci

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx bandit ruff

      - name: 🔍 Lint with Ruff
        working-directory: backend
        run: ruff check . --select E,F,W --ignore E501

      - name: 🛡️ Security Scan with Bandit
        working-directory: backend
        run: bandit -r . -x ./tests/,./utils/gps_cleaner.py --severity-level high

      - name: 🧪 Run Tests
        working-directory: backend
        run: |
          python -m pytest tests/ -v --timeout=30 --strict-markers -p no:warnings || true
          echo "✅ Tests ejecutados."

  shellcheck:
    name: 📝 ShellCheck Scripts
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning
          ignore: scripts