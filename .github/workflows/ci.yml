name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint con Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check backend/

  test:
    name: Tests unitarios
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
      - run: pip install -r backend/requirements.txt
      - name: Run unit tests (no DB required)
        run: cd backend && python -m pytest tests/test_gps_cleaner.py -v --tb=short

  security:
    name: SAST Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
      - run: pip install bandit
      - run: bandit -r backend/ -x backend/tests/ -ll --skip B101,B105,B107,B110
