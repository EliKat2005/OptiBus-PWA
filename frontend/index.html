<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <title>OptiBus MVP</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    
    <!-- iOS PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="OptiBus">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Estilos de la App -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Indicador de estado de conexión -->
    <div id="connection-status" class="connection-lost">
        <span id="connection-text">🔴 Sin conexión</span>
    </div>

    <!-- Botón flotante para GPS -->
    <button id="btn-gps" title="Encontrar mi parada cercana">
        📍
    </button>
    
    <!-- Botón flotante para recargar app (limpiar caché) -->
    <button id="btn-refresh" title="Recargar App y limpiar Caché">
        🔄
    </button>
    
    <div id="map"></div>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Lógica de la App -->
    <script src="app.js"></script>

    <!-- Registrar Service Worker para funcionalidad PWA offline -->
    <!-- El registro se realiza desde app.js (initServiceWorker) para cumplir con CSP sin unsafe-inline -->
</body>
</html>
