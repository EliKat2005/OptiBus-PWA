<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <title>OptiBus — Transporte en Tiempo Real</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="description" content="Rastreo en tiempo real de autobuses. Rutas, paradas y GPS en vivo.">
    
    <!-- iOS PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="OptiBus">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Estilos de la App -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Panel Lateral -->
    <div id="side-panel">
        <div id="panel-header">
            <span>OptiBus</span>
            <div style="display:flex;gap:6px">
                <button id="dark-mode-toggle" title="Modo oscuro" aria-label="Alternar modo oscuro" style="background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);border-radius:6px;color:#fff;font-size:16px;cursor:pointer;padding:4px 8px">🌙</button>
            </div>
        </div>
        <!-- Barra de búsqueda de paradas -->
        <div id="search-bar">
            <div class="search-input-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" placeholder="Buscar parada o ruta…" autocomplete="off">
                <button id="search-clear" class="search-clear-btn" style="display:none" aria-label="Limpiar búsqueda">✕</button>
            </div>
            <div id="search-results" class="search-results-dropdown"></div>
        </div>
        <!-- Planificador de viaje -->
        <div id="route-planner" style="flex-shrink:0;padding:4px 8px;border-bottom:1px solid var(--border);display:none">
            <div style="display:flex;gap:4px;margin-bottom:4px">
                <input type="text" id="plan-from" placeholder="Origen…" autocomplete="off" style="flex:1;padding:6px 8px;font-size:12px;border:1px solid var(--border);border-radius:6px;background:var(--bg-panel);color:var(--text)">
                <input type="text" id="plan-to" placeholder="Destino…" autocomplete="off" style="flex:1;padding:6px 8px;font-size:12px;border:1px solid var(--border);border-radius:6px;background:var(--bg-panel);color:var(--text)">
            </div>
            <button id="plan-submit" style="width:100%;padding:6px;background:var(--primary);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer">🚌 Planificar ruta</button>
            <div id="plan-result" style="margin-top:4px;font-size:11px;color:var(--text-muted);text-align:center"></div>
        </div>
        <!-- Chips de filtro de rutas (única vista de rutas) -->
        <div id="route-filter-chips"></div>
        <!-- Favoritos -->
        <div id="favorites-section">
            <div class="section-header">⭐ Favoritos</div>
            <div id="favorites-list"></div>
        </div>
        <!-- Panel inferior: detalles de paradas de la ruta seleccionada -->
        <div id="stopList">
            <div class="empty-state" id="stopList-empty">Selecciona una ruta para ver sus paradas</div>
        </div>
    </div>

    <!-- Botón toggle del panel (mostrar/ocultar) -->
    <button id="btn-toggle-panel" title="Mostrar / Ocultar panel" aria-label="Toggle panel">☰</button>

    <!-- Indicador de estado de conexión WebSocket -->
    <div id="connection-status" class="connection-status lost">
        <span id="connection-text">🔴 Sin conexión</span>
    </div>

    <!-- Botón flotante para GPS (encontrar paradas cercanas) -->
    <button id="btn-gps" title="Encontrar mi parada cercana" aria-label="Buscar paradas cercanas">📍</button>
    
    <!-- Botón flotante para recargar app (limpiar caché) -->
    <button id="btn-refresh" title="Recargar App y limpiar Caché" aria-label="Recargar">🔄</button>
    
    <!-- Mapa Leaflet -->
    <div id="map"></div>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Lógica de la App -->
    <script src="app.js"></script>
</html>
