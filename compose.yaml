version: "3.8"

x-env: &default-env
  POSTGRES_DB: ${POSTGRES_DB:-optibus}
  POSTGRES_USER: ${POSTGRES_USER:-optibus}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
  POSTGRES_HOST: ${POSTGRES_HOST:-db}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}

services:
  db:
    image: docker.io/postgis/postgis:16-3.4
    container_name: optibus_db
    environment:
      <<: *default-env
    volumes:
      - db_data:/var/lib/postgresql/data
    # DevSecOps: Puerto no expuesto. Acceso solo vía red interna backend_net.
    # Para tareas admin: podman exec -it optibus_db psql -U optibus -d optibus
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-optibus} -d ${POSTGRES_DB:-optibus}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    restart: unless-stopped
    networks:
      - backend_net

  api:
    build: ./backend
    container_name: optibus_api
    environment:
      <<: *default-env
      OPTIBUS_API_KEY: ${OPTIBUS_API_KEY}
      ENABLE_BUS_SIMULATOR: ${ENABLE_BUS_SIMULATOR:-true}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app:Z
    working_dir: /app
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M
    restart: unless-stopped
    networks:
      - backend_net

  web:
    image: docker.io/library/caddy:2.8-alpine
    container_name: optibus_web
    environment:
      # Inject DOMAIN for Caddyfile automatic HTTPS
      - DOMAIN=${DOMAIN:-localhost}
    ports:
      # Prod DevSecOps: HTTP/HTTPS standard ports instead of 8080
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:z
      - ./frontend:/srv/frontend:z
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    restart: unless-stopped
    networks:
      - backend_net

volumes:
  db_data:
  caddy_data:
  caddy_config:

networks:
  backend_net:
    driver: bridge
