version: "3.8"

services:
  db:
    image: docker.io/postgis/postgis:16-3.4
    container_name: optibus_db
    environment:
      POSTGRES_DB: optibus
      POSTGRES_USER: optibus
      POSTGRES_PASSWORD: optibus123
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: ./backend
    container_name: optibus_api
    environment:
      DATABASE_URL: postgresql://optibus:optibus123@db:5432/optibus
    depends_on:
      - db
    volumes:
      - ./backend:/app:Z
    working_dir: /app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  web:
    image: docker.io/library/caddy:2.7-alpine
    container_name: optibus_web
    ports:
      - "8080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:z
      - ./frontend:/srv/frontend:z
    depends_on:
      - api

volumes:
  db_data:
    driver: local