version: "3.8"

x-env: &default-env
  POSTGRES_DB: ${POSTGRES_DB:-optibus}
  POSTGRES_USER: ${POSTGRES_USER:-optibus}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
  POSTGRES_HOST: ${POSTGRES_HOST:-db}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}

services:
  redis:
    image: docker.io/library/redis:7-alpine
    container_name: optibus_redis
    command: redis-server --save 60 1 --loglevel warning --maxmemory 64mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-optibus_redis}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-optibus_redis}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 96M
    restart: unless-stopped
    networks:
      - backend_net

  db:
    image: docker.io/postgis/postgis:16-3.4
    container_name: optibus_db
    environment:
      <<: *default-env
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-optibus} -d ${POSTGRES_DB:-optibus}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    restart: unless-stopped
    networks:
      - backend_net

  api:
    build: ./backend
    container_name: optibus_api
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      <<: *default-env
      ENABLE_BUS_SIMULATOR: ${ENABLE_BUS_SIMULATOR:-false}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-optibus_redis}@redis:6379/0}
      OPTIBUS_API_KEY: ${OPTIBUS_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:80,http://localhost,http://127.0.0.1}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Dev: Para desarrollo local con hot-reload, usar compose.override.yaml con volumes: ./backend:/app:Z
    working_dir: /app
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - backend_net

  web:
    image: docker.io/library/caddy:2.8-alpine
    container_name: optibus_web
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:z
      - ./frontend:/srv/frontend:z
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    restart: unless-stopped
    networks:
      - backend_net

  prometheus:
    image: docker.io/prom/prometheus:v2.55.1
    container_name: optibus_prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:z
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    restart: unless-stopped
    networks:
      - backend_net

  grafana:
    image: docker.io/grafana/grafana:11.5.1
    container_name: optibus_grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:z
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      prometheus:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    restart: unless-stopped
    networks:
      - backend_net

volumes:
  db_data:
  caddy_data:
  caddy_config:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  backend_net:
    driver: bridge